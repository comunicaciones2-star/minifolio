name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-next/package-lock.json

      - name: Install dependencies
        working-directory: app-next
        run: npm ci

      - name: Build static export
        working-directory: app-next
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /minifolio
          NEXT_PUBLIC_DASHBOARD_PIN: ${{ secrets.DASHBOARD_PIN }}

      - name: Ensure .nojekyll for _next assets
        run: touch app-next/out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app-next/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
